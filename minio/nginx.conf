worker_processes  1;

events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;
    client_max_body_size     10000m; 

    sendfile        on;
    keepalive_timeout  65;
	
	
	# HTTP 重定向到 HTTPS
	server {
		listen 80;
		server_name 192.168.2.24;
		# 修复：重定向到正确的域名（去掉 .test）
		return 301 https://192.168.2.24$request_uri;
	}

    server {
	    listen 443 ssl;
        server_name   192.168.2.24;
        client_max_body_size   10240m;
        client_body_buffer_size   256k;

		ssl_certificate ssl/public.crt;
		ssl_certificate_key ssl/private.key;
		
    	ssl_protocols TLSv1.2 TLSv1.3;
    	ssl_ciphers HIGH:!aNULL:!MD5;
 

		location / {
            alias  dist/;
            index  index.html index.htm;
        }
		
		
		location ^~ /jmis-cloud/api/ {
			proxy_pass http://192.168.2.91:82/;
  			index  index.html index.htm;
                        proxy_set_header x-forwarded-for  $remote_addr;
		}
		
		location ^~ /flow/ {
			proxy_pass http://127.0.0.1:81/;
  			index  index.html index.htm;
                        proxy_set_header x-forwarded-for  $remote_addr;
		}
		
		# 新增: 代理 MinIO
        location ^~ /jmis-cloud/ {
            # 注意这里匹配 /jmis-cloud/ 但不包含 /jmis-cloud/api/
            # 需要调整 location 顺序,让 /jmis-cloud/api/ 优先匹配
            
            proxy_pass https://192.168.2.91:9000;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 如果 MinIO 使用自签名证书
            proxy_ssl_verify off;
            
            # 大文件支持
            proxy_request_buffering off;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
            proxy_read_timeout 300;
        }
    }
}

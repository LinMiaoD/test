server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: multi-datasource-integration
  
  # 动态数据源配置
  datasource:
    dynamic:
      # 设置默认的数据源或者数据源组，默认值即为 master
      primary: mysql
      # 严格模式，默认false，当未匹配到指定数据源时是否使用默认数据源
      strict: false
      datasource:
        # MySQL 数据源配置
        mysql:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://localhost:3306/test_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
          username: root
          password: root123456
          type: com.alibaba.druid.pool.DruidDataSource
          druid:
            initial-size: 5
            min-idle: 5
            max-active: 20
            max-wait: 60000
            time-between-eviction-runs-millis: 60000
            min-evictable-idle-time-millis: 300000
            validation-query: SELECT 1
            test-while-idle: true
            test-on-borrow: false
            test-on-return: false
            pool-prepared-statements: true
            max-pool-prepared-statement-per-connection-size: 20
            filters: stat,wall
            use-global-data-source-stat: true
            stat-view-servlet:
              enabled: true
              url-pattern: /druid/*
              login-username: admin
              login-password: admin123
            web-stat-filter:
              enabled: true
              url-pattern: /*
              exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
        
        # ClickHouse 数据源配置
        clickhouse:
          driver-class-name: com.clickhouse.jdbc.ClickHouseDriver
          url: jdbc:clickhouse://localhost:8123/default?socket_timeout=300000&connect_timeout=30000
          username: default
          password: 
          type: com.alibaba.druid.pool.DruidDataSource
          druid:
            initial-size: 3
            min-idle: 3
            max-active: 10
            max-wait: 60000
            time-between-eviction-runs-millis: 60000
            min-evictable-idle-time-millis: 300000
            validation-query: SELECT 1
            test-while-idle: true
            test-on-borrow: false
            test-on-return: false

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.multi.entity
  configuration:
    # 驼峰转下划线
    map-underscore-to-camel-case: true
    # 打印SQL日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 缓存配置
    cache-enabled: true
    lazy-loading-enabled: true
    aggressive-lazy-loading: false
  global-config:
    banner: false
    db-config:
      # MySQL 使用自增主键，ClickHouse 使用分配ID
      id-type: AUTO
      # 逻辑删除配置
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      # 表名前缀
      table-prefix: t_

# 日志配置
logging:
  level:
    root: INFO
    com.example.multi: DEBUG
    com.example.multi.mapper: DEBUG
    com.baomidou.dynamic: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/application.log
    max-size: 100MB
    max-history: 30

# 应用配置
app:
  # 是否启用 ClickHouse（用于降级处理）
  clickhouse:
    enabled: true
  # 批量插入大小
  batch:
    size: 1000
